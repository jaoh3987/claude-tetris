<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-bar">
      <h1 class="game-title">TETRIS</h1>
      <div class="theme-toggle">
        <span class="icon">🌙</span>
        <label class="switch">
          <input type="checkbox" id="theme-toggle-input" aria-label="Cambiar tema claro/oscuro" />
          <span class="slider"></span>
        </label>
        <span class="icon">☀️</span>
      </div>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records-section" id="records-panel">
          <span class="label">RECORDS</span>
          <table class="records-table" id="records-table">
            <tbody id="records-table-body"></tbody>
          </table>
          <div class="records-stats">
            <div class="records-stat">
              <span class="records-stat-label">Mejor combo</span>
              <span class="records-stat-value" id="best-combo-value">0</span>
            </div>
            <div class="records-stat">
              <span class="records-stat-label">Máx. líneas</span>
              <span class="records-stat-value" id="max-lines-value">0</span>
            </div>
          </div>
          <button id="reset-records-btn" class="reset-records-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="new-highscore" class="new-highscore hidden">
          <span class="label">¡Nuevo récord! Ingresa tu nombre</span>
          <div class="new-highscore-input-row">
            <input type="text" id="highscore-name-input" maxlength="12" placeholder="Nombre" />
            <button id="save-highscore-btn">Guardar</button>
          </div>
        </div>

        <table class="records-table overlay-records-table" id="overlay-records-table">
          <tbody id="overlay-records-table-body"></tbody>
        </table>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
